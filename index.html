<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>PINOCCHIO — AR Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c9a84c;
      --gold-lt: #e8c97a;
      --cream:   #f5ede0;
      --bg:      #0a0a0a;
      --green:   #1a2e22;
      --muted:   rgba(232,221,208,0.5);
      --crimson: #b03a2e;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
    }

    /* ════════════════════════════════
       CAMERA LAYER — full background
    ════════════════════════════════ */
    #camera-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #000;
      overflow: hidden;
    }
    #camera-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Subtle dark vignette so UI reads over camera */
    #camera-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%,   rgba(0,0,0,0.45) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.7)  0%, transparent 55%);
      pointer-events: none;
    }

    /* ════════════════════════════════
       3D MODEL LAYER — on floor
    ════════════════════════════════ */
    #model-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* model-viewer fills the whole screen so the 3D dish
       appears to sit on the real floor captured by camera */
    #ar-model-viewer {
      width: 100vw;
      height: 100svh;
      display: block;
      background: transparent;
      --progress-bar-color: var(--gold);
      --progress-mask: transparent;
      pointer-events: auto;
    }

    /* When no model is loaded yet, hide the viewer */
    #ar-model-viewer.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ════════════════════════════════
       UI OVERLAY — on top of everything
    ════════════════════════════════ */
    #ui-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none; /* children opt-in */
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      pointer-events: auto;
      background: linear-gradient(180deg, rgba(0,0,0,0.65) 0%, transparent 100%);
    }
    .back-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.35);
      background: rgba(26,46,34,0.75);
      color: var(--gold);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    .top-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 4px;
      color: var(--gold);
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    }
    .cart-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--gold);
      color: #0a0a0a;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .cart-badge {
      position: absolute; top: -2px; right: -2px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--crimson);
      color: #fff;
      font-size: 9px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── CATEGORY TABS ── */
    .cat-tabs {
      display: flex;
      gap: 8px;
      padding: 4px 20px 10px;
      overflow-x: auto;
      scrollbar-width: none;
      pointer-events: auto;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 30px;
      border: 1.5px solid rgba(201,168,76,0.25);
      background: rgba(0,0,0,0.45);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    .cat-tab.active {
      background: var(--gold);
      color: #0a0a0a;
      border-color: var(--gold);
      font-weight: 600;
    }
    .cat-tab:hover:not(.active) {
      border-color: rgba(201,168,76,0.5);
      color: var(--gold-lt);
    }

    /* spacer — camera + 3D model visible in the middle */
    .stage-spacer { flex: 1; }

    /* ── DISH INFO CARD ── */
    .dish-info-card {
      pointer-events: auto;
      padding: 0 20px 12px;
      text-align: center;
      /* glass panel */
      background: linear-gradient(0deg, rgba(0,0,0,0.7) 60%, transparent 100%);
    }
    .dish-info-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
    .dish-info-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto 8px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    }
    .dish-info-tags {
      display: flex; gap: 6px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .tag {
      font-size: 11px; padding: 3px 12px;
      border-radius: 20px; font-weight: 500;
    }
    .tag-veg {
      background: rgba(74,140,65,0.25);
      color: #8ddf7e;
      border: 1px solid rgba(74,140,65,0.35);
      backdrop-filter: blur(4px);
    }
    .dish-info-price {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: var(--gold-lt);
      margin-bottom: 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .dish-info-price .sym {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--muted);
    }

    /* ── AR STATUS INDICATOR ── */
    .ar-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
      min-height: 24px;
    }
    .ar-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }
    .ar-status-dot.loading {
      background: #888;
      animation: spin-dot 0.8s linear infinite;
    }
    .ar-status-dot.placed {
      background: #5cdb5c;
      animation: none;
    }
    @keyframes pulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%    { opacity:0.3; transform:scale(0.6); }
    }
    @keyframes spin-dot {
      to { transform: rotate(360deg); }
    }
    .ar-status-text {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: rgba(232,221,208,0.7);
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
    }

    /* ── CARET ── */
    .caret-row {
      display: flex; justify-content: center;
      padding: 4px 0 6px;
      pointer-events: none;
    }
    .caret {
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 11px solid var(--gold);
      filter: drop-shadow(0 2px 6px rgba(201,168,76,0.7));
    }

    /* ── THUMBNAIL STRIP ── */
    .thumb-strip-wrap {
      pointer-events: auto;
      padding-bottom: max(env(safe-area-inset-bottom), 18px);
    }
    .thumb-strip {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 6px 24px 4px;
      scrollbar-width: none;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .thumb-strip::-webkit-scrollbar { display: none; }

    .thumb-item {
      flex-shrink: 0;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .thumb-ring {
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 2.5px solid rgba(201,168,76,0.2);
      padding: 3px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.25s cubic-bezier(.34,1.56,.64,1);
      position: relative;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }
    .thumb-item.active .thumb-ring {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.2), 0 0 20px rgba(201,168,76,0.4);
    }
    .thumb-item:hover  .thumb-ring { transform: scale(1.08); }
    .thumb-item:active .thumb-ring { transform: scale(0.93); }

    .thumb-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .thumb-inner img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .thumb-item.active .thumb-ring::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(201,168,76,0.9);
    }

    .thumb-label {
      font-size: 10px;
      color: rgba(232,221,208,0.55);
      text-align: center;
      max-width: 68px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .thumb-item.active .thumb-label { color: var(--gold-lt); font-weight: 500; }

    /* ── LOADING OVERLAY ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .load-ring {
      width: 40px; height: 40px;
      border: 2px solid rgba(201,168,76,0.12);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-text {
      font-family: 'Cinzel', serif;
      font-size: 11px; letter-spacing: 4px;
      color: var(--muted);
    }

    /* ── CAMERA PERMISSION SCREEN ── */
    .cam-permission {
      position: fixed; inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      z-index: 9998;
      padding: 32px;
      text-align: center;
    }
    .cam-permission.show { display: flex; }
    .cam-perm-icon { font-size: 52px; }
    .cam-perm-title {
      font-family: 'Cinzel', serif;
      font-size: 16px; letter-spacing: 3px;
      color: var(--gold);
    }
    .cam-perm-sub {
      font-size: 13px; color: var(--muted);
      line-height: 1.65; max-width: 280px;
    }
    .cam-perm-btn {
      margin-top: 8px;
      padding: 13px 32px;
      background: var(--gold);
      color: #000;
      font-family: 'Cinzel', serif;
      font-size: 13px; letter-spacing: 2px;
      border: none; border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    /* ── NO-MODEL TOAST ── */
    .no-model-toast {
      position: fixed;
      bottom: 180px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--muted);
      font-size: 12px; letter-spacing: 1px;
      padding: 10px 22px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }
    .no-model-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- 1. CAMERA BACKGROUND -->
<div id="camera-layer">
  <video id="camera-video" autoplay playsinline muted></video>
</div>

<!-- 2. 3D MODEL — rendered on top of camera -->
<div id="model-layer">
  <model-viewer
    id="ar-model-viewer"
    class="hidden"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    shadow-softness="0.8"
    environment-image="neutral"
    exposure="1.1"
    camera-orbit="0deg 65deg 1.8m"
    min-camera-orbit="auto auto 0.6m"
    max-camera-orbit="auto auto 4m"
    interaction-prompt="none"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    ar-scale="fixed"
  ></model-viewer>
</div>

<!-- 3. UI OVERLAY -->
<div id="ui-overlay">

  <div class="top-bar">
    <div class="back-btn">←</div>
    <div class="top-title">PINOCCHIO</div>
    <div class="cart-btn">
      🛒
      <div class="cart-badge">1</div>
    </div>
  </div>

  <div class="cat-tabs" id="cat-tabs"></div>

  <!-- camera + 3D visible here -->
  <div class="stage-spacer"></div>

  <div class="dish-info-card">
    <div class="ar-status" id="ar-status">
      <div class="ar-status-dot" id="ar-dot"></div>
      <span class="ar-status-text" id="ar-text">POINT AT A FLAT SURFACE</span>
    </div>
    <div class="dish-info-name"  id="info-name"></div>
    <div class="dish-info-desc"  id="info-desc"></div>
    <div class="dish-info-tags"  id="info-tags"></div>
    <div class="dish-info-price" id="info-price"></div>
  </div>

  <div class="caret-row"><div class="caret"></div></div>

  <div class="thumb-strip-wrap">
    <div class="thumb-strip" id="thumb-strip"></div>
  </div>

</div>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="load-ring"></div>
  <p class="load-text">LOADING MENU</p>
</div>

<!-- Camera permission prompt -->
<div class="cam-permission" id="cam-permission">
  <div class="cam-perm-icon">📷</div>
  <div class="cam-perm-title">CAMERA ACCESS</div>
  <div class="cam-perm-sub">
    PINOCCHIO uses your camera to place<br>
    3D dishes on your table in the real world.
  </div>
  <button class="cam-perm-btn" id="cam-perm-btn">ALLOW CAMERA</button>
</div>

<!-- No model toast -->
<div class="no-model-toast" id="no-model-toast">No 3D model for this dish</div>

<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const ASSETS_BASE = '3d-model';

const LOCAL_ASSETS = {
  'pistachio-sauce-bigne-with-ricotta': { folder:'Pistachio-Sauce-Bigne-with-Ricotta', file:'Pistachio-Sauce-Bigne-with-Ricotta', scale:0.25 },
  'pinocchio-tiramisu':                 { folder:'Pinocchio-Tiramisu',                 file:'Pinocchio-Tiramisu',                 scale:0.25 },
  'cheesy-green-lasagne':               { folder:'Cheesy-Green-Lasagne',               file:'Cheesy-Green-Lasagne',               scale:0.12 },
  'fried-calamari':                     { folder:'Fried-Calamari',                     file:'Fried-Calamari',                     scale:0.25 },
};
const EMOJI_MAP = {
  'pistachio-sauce-bigne-with-ricotta':'🍮',
  'pinocchio-tiramisu':'🍰',
  'cheesy-green-lasagne':'🧀',
  'fried-calamari':'🦑',
};
const CAT_LABELS = { all:'All', starter:'Starters', 'main-course':'Mains', dessert:'Desserts' };
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTEkmIGoRgD1rQNmDgmY3lvB7WBOg86iOHHrS0MJ6qQiReuDHsUyX3YV7KoWXxTbefyBUWPTHpvUOt3/pub?output=csv';
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent)||
              (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let allDishes=[], rawRows=[];
let activeCategory='all';
let activeDishIdx=0;
let filteredDishes=[];
let cameraStream=null;
let modelLoaded=false;
let toastTimer=null;

const mv = document.getElementById('ar-model-viewer');

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function norm(s){ return (s||'').toLowerCase().replace(/\s+/g,'-').trim(); }
function getAssets(name){
  const k=norm(name), e=LOCAL_ASSETS[k];
  if(!e) return {poster:'',glb:'',usdz:'',scale:0.05};
  const b=`${ASSETS_BASE}/${e.folder}/${e.file}`;
  return {poster:`${b}.png`,glb:`${b}.glb`,usdz:`${b}.usdz`,scale:e.scale};
}
function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const vals=splitLine(line),obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim();});
    return obj;
  });
}
function splitLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'&&!inQ){inQ=true;continue;}
    if(ch==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else{inQ=false;}continue;}
    if(ch===','&&!inQ){res.push(cur);cur='';continue;}
    cur+=ch;
  }
  res.push(cur);return res;
}
function truthy(v){return['true','yes','1'].includes((v||'').toLowerCase());}
function rowToDish(row){
  const a=getAssets(row['name']);
  return{
    id:row['id']||'',name:row['name']||'',
    category:(row['category']||'other').toLowerCase(),
    desc:row['description']||'',
    price:parseInt(row['price']||'0',10),
    veg:truthy(row['veg']),available:truthy(row['available']),
    ...a,emoji:EMOJI_MAP[norm(row['name'])]||'🍽️',
  };
}

/* ═══════════════════════════════════════
   CAMERA
═══════════════════════════════════════ */
async function startCamera(){
  const video = document.getElementById('camera-video');
  try {
    // Prefer back (environment) camera for AR feel
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} },
      audio:false
    });
    cameraStream = stream;
    video.srcObject = stream;
    await video.play();
    document.getElementById('cam-permission').classList.remove('show');
    return true;
  } catch(err){
    console.warn('Camera error:', err);
    // Show permission prompt or just show dark bg — don't block the menu
    document.getElementById('cam-permission').classList.add('show');
    return false;
  }
}

document.getElementById('cam-perm-btn').addEventListener('click', async ()=>{
  document.getElementById('cam-permission').classList.remove('show');
  await startCamera();
});

/* ═══════════════════════════════════════
   STATUS INDICATOR
═══════════════════════════════════════ */
function setStatus(state, text){
  const dot  = document.getElementById('ar-dot');
  const txt  = document.getElementById('ar-text');
  dot.className  = 'ar-status-dot';
  if(state==='loading') dot.classList.add('loading');
  if(state==='placed')  dot.classList.add('placed');
  txt.textContent = text;
}

/* ═══════════════════════════════════════
   LOAD MODEL INTO VIEWER
═══════════════════════════════════════ */
function loadModel(dish){
  if(!dish.glb){
    mv.classList.add('hidden');
    setStatus('idle','NO 3D MODEL FOR THIS DISH');
    showNoModelToast();
    return;
  }

  modelLoaded = false;
  mv.classList.remove('hidden');
  setStatus('loading','LOADING 3D MODEL…');

  // Set src + scale
  const s=(dish.scale??1).toFixed(6);
  mv.setAttribute('scale',`${s} ${s} ${s}`);

  // iOS USDZ
  if(isIOS && dish.usdz){
    mv.setAttribute('ios-src', dish.usdz);
  } else {
    mv.removeAttribute('ios-src');
  }

  // Poster
  if(dish.poster) mv.setAttribute('poster', dish.poster);
  else            mv.removeAttribute('poster');

  mv.setAttribute('src', dish.glb);
}

// model-viewer events
mv.addEventListener('load', ()=>{
  modelLoaded = true;
  setStatus('idle','DISH PLACED ON YOUR TABLE');
  // The model is now visible in the 3D view overlaid on camera
});
mv.addEventListener('error', ()=>{
  setStatus('idle','COULD NOT LOAD 3D MODEL');
  mv.classList.add('hidden');
});
mv.addEventListener('ar-status', e=>{
  const s = e.detail.status;
  if(s==='session-started') setStatus('placed','PLACED ON SURFACE ✓');
  if(s==='failed')          setStatus('idle','AR UNAVAILABLE ON THIS DEVICE');
});

/* ═══════════════════════════════════════
   NO MODEL TOAST
═══════════════════════════════════════ */
function showNoModelToast(){
  const t = document.getElementById('no-model-toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2500);
}

/* ═══════════════════════════════════════
   RENDER UI
═══════════════════════════════════════ */
function getFiltered(){
  return activeCategory==='all' ? allDishes : allDishes.filter(d=>d.category===activeCategory);
}
function getCategories(){
  return ['all',...new Set(allDishes.map(d=>d.category))];
}

function renderCatTabs(){
  const wrap=document.getElementById('cat-tabs');
  wrap.innerHTML=getCategories().map(c=>
    `<button class="cat-tab${c===activeCategory?' active':''}" data-cat="${c}">
       ${CAT_LABELS[c]||(c.charAt(0).toUpperCase()+c.slice(1))}
     </button>`
  ).join('');
  wrap.querySelectorAll('.cat-tab').forEach(btn=>
    btn.addEventListener('click',()=>{
      activeCategory=btn.dataset.cat;
      activeDishIdx=0;
      renderCatTabs();
      renderThumbStrip();
      selectDish(0);
    })
  );
}

function renderThumbStrip(){
  filteredDishes=getFiltered();
  const strip=document.getElementById('thumb-strip');
  strip.innerHTML=filteredDishes.map((d,i)=>{
    const inner=d.poster
      ? `<img src="${d.poster}" alt="${d.name}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <span style="display:none;font-size:22px;align-items:center;justify-content:center;width:100%;height:100%;">${d.emoji}</span>`
      : `<span style="font-size:22px;">${d.emoji}</span>`;
    return `
      <div class="thumb-item${i===activeDishIdx?' active':''}" data-idx="${i}">
        <div class="thumb-ring"><div class="thumb-inner">${inner}</div></div>
        <div class="thumb-label">${d.name.split(' ').slice(0,2).join(' ')}</div>
      </div>`;
  }).join('');

  strip.querySelectorAll('.thumb-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const idx=parseInt(item.dataset.idx);
      activeDishIdx=idx;
      updateThumbActive();
      selectDish(idx);
    });
  });

  scrollThumbToActive();
}

function updateThumbActive(){
  document.querySelectorAll('.thumb-item').forEach((el,i)=>
    el.classList.toggle('active',i===activeDishIdx)
  );
  scrollThumbToActive();
}
function scrollThumbToActive(){
  const el=document.querySelectorAll('.thumb-item')[activeDishIdx];
  if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

/* ═══════════════════════════════════════
   SELECT DISH — updates info + loads 3D
═══════════════════════════════════════ */
function selectDish(idx){
  filteredDishes=getFiltered();
  const d=filteredDishes[idx];
  if(!d) return;

  // Update info card
  document.getElementById('info-name').textContent = d.name;
  document.getElementById('info-desc').textContent = d.desc;
  document.getElementById('info-price').innerHTML  =
    `<span class="sym">₹</span>${d.price.toLocaleString('en-IN')}`;
  document.getElementById('info-tags').innerHTML   =
    d.veg ? '<span class="tag tag-veg">🌿 Vegetarian</span>' : '';

  // Load 3D model → appears on camera view directly
  loadModel(d);
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
async function init(){
  const loadEl=document.getElementById('loading');
  try{
    // Start camera immediately (in parallel with menu fetch)
    startCamera(); // non-blocking

    const res=await fetch(CSV_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    rawRows=parseCSV(text);
    allDishes=rawRows.map(rowToDish).filter(d=>d.name&&d.available);
    if(!allDishes.length) throw new Error('No dishes');

    loadEl.classList.add('hidden');
    setTimeout(()=>{ loadEl.style.display='none'; },500);

    filteredDishes=getFiltered();
    renderCatTabs();
    renderThumbStrip();
    selectDish(0);

  }catch(err){
    console.error(err);
    loadEl.innerHTML=`
      <div style="text-align:center;padding:2rem;color:#c9a84c;font-family:'Cinzel',serif;letter-spacing:2px;">
        <div style="font-size:36px;margin-bottom:14px">🍽️</div>
        <div>Could not load menu</div>
        <div style="font-size:11px;opacity:0.5;margin-top:8px;font-family:'DM Sans',sans-serif">Check connection</div>
      </div>`;
  }
}

init();
</script>
